<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <title>Wick Charts — High-performance timeseries charts for React, Vue, Svelte</title>
    <meta name="description" content="Canvas-rendered candlestick, line, bar, pie, and sparkline charts for React, Vue, and Svelte. Real-time streaming at 60fps, 22 built-in themes, zoom, pan, crosshair, tooltips. Tree-shakeable with zero runtime dependencies." />
    <meta name="keywords" content="charts, charting library, candlestick chart, line chart, bar chart, pie chart, sparkline, timeseries, financial charts, trading charts, OHLC, react charts, vue charts, svelte charts, canvas charts, real-time charts, streaming charts" />
    <meta name="author" content="Evgeny Formanenko" />
    <meta name="theme-color" content="#0a0e17" />
    <link rel="canonical" href="https://mo4islona.github.io/wick-charts/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wick Charts" />
    <meta property="og:title" content="Wick Charts — High-performance timeseries charts for React, Vue, Svelte" />
    <meta property="og:description" content="Canvas-rendered candlestick, line, bar, pie, and sparkline charts. Real-time streaming at 60fps, 22 themes, tree-shakeable, zero runtime dependencies." />
    <meta property="og:url" content="https://mo4islona.github.io/wick-charts/" />
    <meta property="og:image" content="https://mo4islona.github.io/wick-charts/public/favicon.svg" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Wick Charts — High-performance timeseries charts for React, Vue, Svelte" />
    <meta name="twitter:description" content="Canvas-rendered candlestick, line, bar, pie, and sparkline charts. Real-time streaming at 60fps, 22 themes, tree-shakeable, zero runtime dependencies." />
    <meta name="twitter:image" content="https://mo4islona.github.io/wick-charts/public/favicon.svg" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0a0e17; }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: radial-gradient(ellipse 120% 60% at 50% -10%, var(--page-glow, transparent), transparent);
      }
      #root { position: relative; z-index: 1; }
      /* Prism token colors */
      .token.keyword { color: #c678dd; }
      .token.string, .token.template-string { color: #98c379; }
      .token.function { color: #61afef; }
      .token.number { color: #d19a66; }
      .token.operator, .token.punctuation { opacity: 0.7; }
      .token.comment { opacity: 0.4; font-style: italic; }
      .token.property { color: #e5c07b; }
      .token.builtin { color: #56b6c2; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
